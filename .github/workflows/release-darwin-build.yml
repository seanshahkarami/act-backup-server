name: Release Darwin Build

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-darwin:
    name: Build darwin-${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          GOOS: darwin
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" -o "dist/act-backup-server-darwin-${GOARCH}" .

      - name: Upload binary to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/act-backup-server-darwin-${{ matrix.arch }}
